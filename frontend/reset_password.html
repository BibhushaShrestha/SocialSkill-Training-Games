<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: #eaf4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.container { text-align: center; }
.card {
  background: white;
  padding: 35px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}
h2 { color: #555; margin-bottom: 8px; }
p { color: #777; margin-bottom: 20px; font-size: 14px; }
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 2px solid #eee;
  font-size: 14px;
  outline: none;
}
input:focus { border-color: #f5d77c; }
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #f5d77c;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}
button:hover { background: #f3cc55; transform: scale(1.05); }
.message { display: none; margin-top: 14px; padding: 10px; border-radius: 10px; font-size: 14px; }
.success { background: #d1fae5; color: #065f46; display: block; }
.error { background: #fee2e2; color: #991b1b; display: block; }
.back-link { display: block; margin-top: 15px; font-size: 14px; color: #555; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>Set New Password</h2>
    <p>Enter your new password below.</p>
    <div id="message" class="message"></div>
    <input type="password" id="password" placeholder="New password">
    <button id="resetBtn" onclick="handleReset()">Reset Password</button>
    <a href="login.html" class="back-link">← Back to Login</a>
  </div>
</div>
<script>
const API = 'http://localhost:5000/api/auth';

function showMessage(text, type) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = `message ${type}`;
}

async function handleReset() {
  const password = document.getElementById('password').value;
  const tempToken = localStorage.getItem('resetTempToken');

  if (!password || password.length < 6) { showMessage('Password must be at least 6 characters.', 'error'); return; }
  if (!tempToken) { showMessage('No reset session found. Please start from Forgot Password.', 'error'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Resetting...';

  try {
    const res = await fetch(`${API}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tempToken, password }),
    });
    const data = await res.json();
    if (data.success) {
      localStorage.removeItem('resetTempToken');
      showMessage('Password reset successful!');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } else {
      showMessage(data.message || 'Reset failed.', 'error');
    }
  } catch (_) {
    showMessage('Server error. Please try again.', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
