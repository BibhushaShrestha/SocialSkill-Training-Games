<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: #FFF9C4;
  background-attachment: fixed;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.float-el{
  position:fixed;
  pointer-events:none;
  opacity:.25;
  z-index:0;
  animation:floatAnim 8s ease-in-out infinite;
}

.float-el:nth-child(1){ top:10%; left:5%; font-size:3rem; }
.float-el:nth-child(2){ top:70%; left:8%; font-size:2.5rem; animation-delay:2s; }
.float-el:nth-child(3){ top:20%; right:5%; font-size:2rem; animation-delay:4s; }
.float-el:nth-child(4){ top:80%; right:10%; font-size:3.5rem; animation-delay:1s; }
.float-el:nth-child(5){ top:50%; left:3%; font-size:1.8rem; animation-delay:3s; }
.float-el:nth-child(6){ top:40%; right:3%; font-size:2.2rem; animation-delay:5s; }
.float-el:nth-child(7){ top:5%; right:25%; font-size:2.8rem; animation-delay:1.5s; }
.float-el:nth-child(8){ top:88%; left:30%; font-size:2.4rem; animation-delay:3.5s; }

@keyframes floatAnim{
  0%,100%{ transform:translateY(0) rotate(0deg); }
  25%{ transform:translateY(-20px) rotate(5deg); }
  50%{ transform:translateY(-10px) rotate(-3deg); }
  75%{ transform:translateY(-25px) rotate(4deg); }
}

.bg-dots{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.08;
  background-image:radial-gradient(circle,#FF8A65 1px,transparent 1px);
  background-size:30px 30px;
}
.container { text-align: center; }
.card {
  background: white;
  padding: 35px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}
h2 { color: #555; margin-bottom: 8px; }
p { color: #777; margin-bottom: 20px; font-size: 14px; }
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 2px solid #eee;
  font-size: 14px;
  outline: none;
}
input:focus { border-color: #286b33; }
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #A7D79C, #81C784);
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}
button:hover { filter: brightness(1.08); transform: scale(1.05); }
.message { display: none; margin-top: 14px; padding: 10px; border-radius: 10px; font-size: 14px; }
.success { background: #d1fae5; color: #065f46; display: block; }
.error { background: #fee2e2; color: #991b1b; display: block; }
.back-link { display: block; margin-top: 15px; font-size: 14px; color: #555; text-decoration: none; }
.pwd-wrapper { position: relative; width: 100%; margin: 10px 0; }
.pwd-wrapper input { margin: 0; padding-right: 40px; }
.pwd-toggle {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; padding: 0; margin: 0;
  font-size: 18px; line-height: 1; color: #888; width: auto;
}
.pwd-toggle:hover { transform: translateY(-50%) scale(1.1); background: none; }
</style>
</head>
<body>
<div class="float-el">🌟</div>
<div class="float-el">⭐</div>
<div class="float-el">🌻</div>
<div class="float-el">🌈</div>
<div class="float-el">✨</div>
<div class="float-el">🌼</div>
<div class="float-el">☀️</div>
<div class="float-el">💛</div>
<div class="bg-dots"></div>

<div class="container">
  <div class="card">
    <h2>Set New Password</h2>
    <p id="statusText">Enter your new password below.</p>
    <div id="message" class="message"></div>
    <div class="pwd-wrapper">
      <input type="password" id="password" placeholder="New password">
      <button class="pwd-toggle" onclick="togglePwd(this)" type="button">👁️</button>
    </div>
    <button id="resetBtn" onclick="handleReset()">Reset Password</button>
    <a href="login.html" class="back-link">← Back to Login</a>
  </div>
</div>
<script>
function togglePwd(btn) {
  const inp = btn.previousElementSibling;
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}

const API = 'http://localhost:5000/api/auth';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
  document.getElementById('statusText').textContent = 'No reset token found. Please request a new reset link.';
  document.getElementById('resetBtn').style.display = 'none';
}

function showMessage(text, type) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = `message ${type}`;
}

async function handleReset() {
  const password = document.getElementById('password').value;
  if (!password || password.length < 6) { showMessage('Password must be at least 6 characters.', 'error'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Resetting...';

  try {
    const res = await fetch(`${API}/reset-password/${token}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    const data = await res.json();
    if (data.success) {
      showMessage('Password reset successful!');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } else {
      showMessage(data.message || 'Reset failed.', 'error');
    }
  } catch (_) {
    showMessage('Server error. Please try again.', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
