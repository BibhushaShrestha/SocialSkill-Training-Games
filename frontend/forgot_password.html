<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: #FFF9C4;
  background-attachment: fixed;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
}

.float-el{
  position:fixed;
  pointer-events:none;
  opacity:.25;
  z-index:0;
  animation:floatAnim 8s ease-in-out infinite;
}

.float-el:nth-child(1){ top:10%; left:5%; font-size:3rem; }
.float-el:nth-child(2){ top:70%; left:8%; font-size:2.5rem; animation-delay:2s; }
.float-el:nth-child(3){ top:20%; right:5%; font-size:2rem; animation-delay:4s; }
.float-el:nth-child(4){ top:80%; right:10%; font-size:3.5rem; animation-delay:1s; }
.float-el:nth-child(5){ top:50%; left:3%; font-size:1.8rem; animation-delay:3s; }
.float-el:nth-child(6){ top:40%; right:3%; font-size:2.2rem; animation-delay:5s; }
.float-el:nth-child(7){ top:5%; right:25%; font-size:2.8rem; animation-delay:1.5s; }
.float-el:nth-child(8){ top:88%; left:30%; font-size:2.4rem; animation-delay:3.5s; }

@keyframes floatAnim{
  0%,100%{ transform:translateY(0) rotate(0deg); }
  25%{ transform:translateY(-20px) rotate(5deg); }
  50%{ transform:translateY(-10px) rotate(-3deg); }
  75%{ transform:translateY(-25px) rotate(4deg); }
}

.bg-dots{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.08;
  background-image:radial-gradient(circle,#FF8A65 1px,transparent 1px);
  background-size:30px 30px;
}
.card {
  background: white;
  padding: 35px;
  border-radius: 20px;
  width: 380px;
  max-width: 100%;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
  text-align: center;
}
h2 { color: #555; margin-bottom: 6px; }
p { color: #777; margin-bottom: 20px; font-size: 14px; }
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 2px solid #eee;
  font-size: 14px;
  outline: none;
}
input:focus { border-color: #286b33; }
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #A7D79C, #81C784);
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 8px;
  transition: 0.3s;
}
button:hover { filter: brightness(1.08); transform: scale(1.03); }
button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.message { display: none; margin: 12px 0; padding: 10px; border-radius: 10px; font-size: 14px; }
.success { background: #d1fae5; color: #065f46; display: block; }
.error { background: #fee2e2; color: #991b1b; display: block; }
.back-link { display: block; margin-top: 16px; font-size: 14px; color: #555; text-decoration: none; }
.reset-link-box {
  background: #f0f7f7; border: 2px dashed #b2dfdb; border-radius: 12px;
  padding: 14px; margin: 12px 0; word-break: break-all; font-size: 13px;
}
</style>
</head>
<body>
<div class="float-el">🌟</div>
<div class="float-el">⭐</div>
<div class="float-el">🌻</div>
<div class="float-el">🌈</div>
<div class="float-el">✨</div>
<div class="float-el">🌼</div>
<div class="float-el">☀️</div>
<div class="float-el">💛</div>
<div class="bg-dots"></div>

<div class="card">
  <h2>Forgot Password?</h2>
  <p>Enter your registered email to receive a reset link.</p>

  <div id="message" class="message"></div>

  <div id="step1">
    <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
    <button id="sendBtn" onclick="handleForgot()">Send Reset Link</button>
  </div>

  <div id="step2" style="display:none;">
    <p style="color:#065f46;font-weight:500;">Reset link generated!</p>
    <div id="linkDisplay" class="reset-link-box"></div>
    <p style="font-size:12px;color:#999;">If no email is configured, click the link above to reset your password.</p>
    <button onclick="window.location.href='login.html'">Back to Login</button>
  </div>

  <a href="login.html" class="back-link">← Back to Login</a>
</div>

<script>
const API = 'http://localhost:5000/api/auth';

function showMessage(text, type) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = `message ${type}`;
}

async function handleForgot() {
  const email = document.getElementById('email').value.trim();
  if (!email || !email.includes('@')) { showMessage('Please enter a valid email.', 'error'); return; }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = 'Sending...';

  try {
    const res = await fetch(`${API}/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();

    if (data.resetLink) {
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      document.getElementById('linkDisplay').innerHTML =
        `<a href="${data.resetLink}" style="color:#065f46;font-weight:600;">Click here to reset your password</a>`;
    } else {
      showMessage(data.message || 'If an account exists, a reset link has been sent.', 'success');
      setTimeout(() => window.location.href = 'login.html', 2500);
    }
  } catch (_) {
    showMessage('Server error. Please try again.', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Send Reset Link';
  }
}
</script>
</body>
</html>
