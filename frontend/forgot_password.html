<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: #eaf4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
}
.card {
  background: white;
  padding: 35px;
  border-radius: 20px;
  width: 380px;
  max-width: 100%;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
  text-align: center;
}
h2 { color: #555; margin-bottom: 6px; }
p { color: #777; margin-bottom: 20px; font-size: 14px; }
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 2px solid #eee;
  font-size: 14px;
  outline: none;
}
input:focus { border-color: #f5d77c; }
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #f5d77c;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 8px;
  transition: 0.3s;
}
button:hover { background: #f3cc55; transform: scale(1.03); }
button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.step { display: none; }
.step.active { display: block; }
.message {
  display: none; margin: 12px 0; padding: 10px; border-radius: 10px; font-size: 14px;
}
.success { background: #d1fae5; color: #065f46; display: block; }
.error { background: #fee2e2; color: #991b1b; display: block; }
.back-link { display: block; margin-top: 16px; font-size: 14px; color: #555; text-decoration: none; }
.otp-display {
  background: #f0f7f7; border: 2px dashed #b2dfdb; border-radius: 12px;
  padding: 16px; margin: 12px 0; font-size: 28px; font-weight: bold;
  letter-spacing: 8px; color: #2c3e50;
}
.otp-note { font-size: 12px; color: #999; margin-top: -4px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <h2>Forgot Password?</h2>
  <p>Reset using your registered phone number.</p>

  <div id="message" class="message"></div>

  <!-- STEP 1: Enter phone -->
  <div id="step1" class="step active">
    <input type="tel" id="phone" placeholder="Enter phone number" autocomplete="tel">
    <button id="sendOtpBtn" onclick="handleSendOtp()">Send OTP</button>
  </div>

  <!-- STEP 2: Enter OTP -->
  <div id="step2" class="step">
    <div class="otp-display" id="otpDisplay" style="display:none;">------</div>
    <p class="otp-note" id="otpNote" style="display:none;">(Displayed here — no SMS service configured)</p>
    <p id="otpSentMsg" style="display:none; color:#065f46; font-weight:500;">OTP has been sent to your phone.</p>
    <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" inputmode="numeric">
    <button id="verifyOtpBtn" onclick="handleVerifyOtp()">Verify OTP</button>
  </div>

  <!-- STEP 3: New password -->
  <div id="step3" class="step">
    <input type="password" id="password" placeholder="New password">
    <button id="resetBtn" onclick="handleResetPassword()">Reset Password</button>
  </div>

  <a href="login.html" class="back-link">← Back to Login</a>
</div>

<script>
const API = 'http://localhost:5000/api/auth';
let currentPhone = '';

function showMessage(text, type) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = `message ${type}`;
}

function showStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(`step${n}`).classList.add('active');
  document.getElementById('message').style.display = 'none';
}

// ---- Step 1: Send OTP ----
async function handleSendOtp() {
  const phone = document.getElementById('phone').value.trim();
  if (!phone) { showMessage('Please enter your phone number.', 'error'); return; }

  const btn = document.getElementById('sendOtpBtn');
  btn.disabled = true; btn.textContent = 'Sending...';

  try {
    const res = await fetch(`${API}/send-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone }),
    });
    const data = await res.json();
    if (data.otp) {
      // Dev mode — show OTP on screen
      currentPhone = phone;
      document.getElementById('otpDisplay').textContent = data.otp;
      document.getElementById('otpDisplay').style.display = 'block';
      document.getElementById('otpNote').style.display = 'block';
      document.getElementById('otpSentMsg').style.display = 'none';
      showStep(2);
    } else if (data.success) {
      // SMS sent — just show input
      currentPhone = phone;
      document.getElementById('otpDisplay').style.display = 'none';
      document.getElementById('otpNote').style.display = 'none';
      document.getElementById('otpSentMsg').style.display = 'block';
      showStep(2);
    } else {
      showMessage(data.message || 'OTP sent if account exists.', 'success');
      setTimeout(() => { if (!data.otp) window.location.href = 'login.html'; }, 2000);
    }
  } catch (_) {
    showMessage('Server error. Please try again.', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Send OTP';
  }
}

// ---- Step 2: Verify OTP ----
async function handleVerifyOtp() {
  const otp = document.getElementById('otp').value.trim();
  if (!otp || otp.length !== 6) { showMessage('Please enter the 6-digit OTP.', 'error'); return; }

  const btn = document.getElementById('verifyOtpBtn');
  btn.disabled = true; btn.textContent = 'Verifying...';

  try {
    const res = await fetch(`${API}/verify-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: currentPhone, otp }),
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('resetTempToken', data.tempToken);
      showStep(3);
    } else {
      showMessage(data.message || 'Invalid OTP.', 'error');
    }
  } catch (_) {
    showMessage('Server error. Please try again.', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Verify OTP';
  }
}

// ---- Step 3: Reset Password ----
async function handleResetPassword() {
  const password = document.getElementById('password').value;
  const tempToken = localStorage.getItem('resetTempToken');
  if (!password || password.length < 6) { showMessage('Password must be at least 6 characters.', 'error'); return; }
  if (!tempToken) { showMessage('Session expired. Please start over.', 'error'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Resetting...';

  try {
    const res = await fetch(`${API}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tempToken, password }),
    });
    const data = await res.json();
    if (data.success) {
      localStorage.removeItem('resetTempToken');
      showMessage('Password reset successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } else {
      showMessage(data.message || 'Reset failed.', 'error');
    }
  } catch (_) {
    showMessage('Server error. Please try again.', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
