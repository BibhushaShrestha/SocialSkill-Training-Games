<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password – Your Game</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

body {
    font-family: 'Poppins', sans-serif;

    /* ✅ changed */
    background: #eaf4f4;

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
}

.container {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
}

.content-wrapper {
    width: 100%;
    max-width: 75%;
    margin: 0 auto;
}

.card {
    background: white;
    border-radius: 1.5rem;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1); /* match login */
    padding: 3rem 2.5rem;
}

/* ✅ button updated */
.reset-btn {
    transition: 0.3s;
    background: #f5d77c;
    font-size: 16px;
}

.reset-btn:hover {
    transform: scale(1.05);
    background: #f3cc55;
}

.back-link {
    color: #555;
}

.back-link:hover {
    text-decoration: underline;
}

.message {
    display: none;
    margin-top: 1.5rem;
    padding: 1rem;
    border-radius: 1rem;
    font-weight: 500;
}

.success { 
    background: #d1fae5; 
    color: #065f46; 
}

.error { 
    background: #fee2e2; 
    color: #991b1b; 
}

/* ✅ input font size like login */
input {
    font-size: 14px;
}

input:focus {
    border-color: #f5d77c !important;
    box-shadow: 0 0 0 3px rgba(245, 215, 124, 0.3);
}

@media (max-width: 1024px) {
    .content-wrapper { max-width: 85%; }
}

@media (max-width: 640px) {
    .content-wrapper { max-width: 100%; }
    .card { padding: 2rem 1.5rem; }
}
</style>
</head>

<body>

<div class="container">

<div class="text-center mb-10">
    <h1 class="text-4xl md:text-5xl font-bold text-gray-600">Your Game</h1>
    <p class="text-gray-500 mt-2 text-lg">Reset your password</p>
</div>

<div class="content-wrapper">
    <div class="card">

        <h2 class="text-2xl md:text-3xl font-semibold text-gray-700 mb-2 text-center">
            Forgot your password?
        </h2>
        
        <p class="text-gray-500 text-center mb-8 text-base md:text-lg">
            No worries! Enter your email and we'll send you a reset link.
        </p>

        <form id="forgotForm" onsubmit="handleForgotSubmit(event)">
            <div class="mb-6">
                <label for="email" class="block text-gray-700 font-medium mb-2 text-lg">
                    Email address
                </label>
                <input 
                    type="email" 
                    id="email"
                    name="email"
                    required
                    placeholder="you@example.com"
                    class="w-full px-5 py-4 rounded-2xl border border-gray-300 outline-none transition-all"
                >
            </div>

            <div id="message" class="message"></div>

            <button 
                type="submit"
                class="reset-btn w-full text-gray-800 font-bold py-3 rounded-xl flex items-center justify-center gap-2 mt-4"
            >
                <i class="fa-solid fa-paper-plane"></i>
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-8">
            <a href="login.html" class="back-link text-sm font-medium">
                ← Back to Login
            </a>
        </div>

    </div>
</div>

</div>

<script>
async function handleForgotSubmit(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const messageEl = document.getElementById('message');
    const submitBtn = document.querySelector('.reset-btn');
    
    if (!email || !email.includes('@')) {
        showMessage('Please enter a valid email address.', 'error');
        return;
    }

    messageEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';

    try {
        const res = await fetch('http://localhost:5000/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();

        showMessage(
            data.message || 'If an account exists, you will receive a reset link shortly.',
            'success'
        );
    } catch (error) {
        showMessage('Server error. Please try again later.', 'error');
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send Reset Link';
    }
}

function showMessage(text, type) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = `message ${type}`;
    el.style.display = 'block';
    
    setTimeout(() => {
        el.style.display = 'none';
    }, 8000);
}
</script>

</body>
</html>
