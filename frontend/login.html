<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #FFF9C4;
    background-attachment: fixed;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.float-el{
  position:fixed;
  pointer-events:none;
  opacity:.25;
  z-index:0;
  animation:floatAnim 8s ease-in-out infinite;
}

.float-el:nth-child(1){ top:10%; left:5%; font-size:3rem; }
.float-el:nth-child(2){ top:70%; left:8%; font-size:2.5rem; animation-delay:2s; }
.float-el:nth-child(3){ top:20%; right:5%; font-size:2rem; animation-delay:4s; }
.float-el:nth-child(4){ top:80%; right:10%; font-size:3.5rem; animation-delay:1s; }
.float-el:nth-child(5){ top:50%; left:3%; font-size:1.8rem; animation-delay:3s; }
.float-el:nth-child(6){ top:40%; right:3%; font-size:2.2rem; animation-delay:5s; }
.float-el:nth-child(7){ top:5%; right:25%; font-size:2.8rem; animation-delay:1.5s; }
.float-el:nth-child(8){ top:88%; left:30%; font-size:2.4rem; animation-delay:3.5s; }

@keyframes floatAnim{
  0%,100%{ transform:translateY(0) rotate(0deg); }
  25%{ transform:translateY(-20px) rotate(5deg); }
  50%{ transform:translateY(-10px) rotate(-3deg); }
  75%{ transform:translateY(-25px) rotate(4deg); }
}

.bg-dots{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.08;
  background-image:radial-gradient(circle,#FF8A65 1px,transparent 1px);
  background-size:30px 30px;
}

.container {
    text-align: center;
}

.logo {
    font-size: 60px;
    background: #f7e7a9;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h1 {
    color: #555;
}

.subtitle {
    color: #777;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 35px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 2px solid #eee;
    font-size: 14px;
    outline: none;
    box-sizing: border-box;
}

.pwd-wrapper {
    position: relative;
    width: 100%;
    margin: 10px 0;
}

.pwd-wrapper input {
    margin: 0;
    padding-right: 40px;
}

.pwd-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin: 0;
    font-size: 18px;
    line-height: 1;
    color: #888;
    width: auto;
}

.pwd-toggle:hover {
    transform: translateY(-50%) scale(1.1);
    background: none;
}

input:focus {
    border-color: #286b33;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #A7D79C, #81C784);
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    filter: brightness(1.08);
    transform: scale(1.05);
}

.link {
    font-size: 13px;
    color: #555;
    cursor: pointer;
    display: block;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="float-el">🌟</div>
<div class="float-el">⭐</div>
<div class="float-el">🌻</div>
<div class="float-el">🌈</div>
<div class="float-el">✨</div>
<div class="float-el">🌼</div>
<div class="float-el">☀️</div>
<div class="float-el">💛</div>
<div class="bg-dots"></div>

<div class="container">
    <div class="logo">😊</div>
    <h1>Login</h1>
    <p class="subtitle">Welcome back! Let's learn something new.</p>
    <div class="card">

<input type="text" id="username" placeholder="Enter Username">
<div class="pwd-wrapper">
  <input type="password" id="password" placeholder="Enter Password">
  <button class="pwd-toggle" onclick="togglePwd('password', this)" type="button">👁️</button>
</div>

<!-- Login -->
<button onclick="loginUser()">⭐ Start Learning</button>

<!-- Forgot Password -->
<span class="link" onclick="forgotPassword()">Forgot Password?</span>

<!-- Create Account -->
<span class="link" onclick="createAccount()">Don't have an account? Create one!</span>

</div>

</div>

<script>
// go to dashboard
function goDashboard(){
    window.location.href = "dashboard.html";
}

// go to create account page
function createAccount(){
    window.location.href = "create_account.html";
}

// go to forgot password page
function forgotPassword(){
    window.location.href = "forgot_password.html";
}

function togglePwd(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}

// Redirect to dashboard if already logged in
if (localStorage.getItem('token')) {
  window.location.href = "dashboard.html";
}
</script>
<script>
const loginUser = async () => {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch('http://localhost:5000/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        username,
        password,
      }),
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = "dashboard.html";
    } else {
      alert(data.message || "Login failed");
    }

  } catch (error) {
    console.error("Login error:", error);
    alert("Server error");
  }
};
</script>
</body>
</html>
