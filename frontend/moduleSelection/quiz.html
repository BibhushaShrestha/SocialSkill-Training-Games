<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Fredoka', sans-serif;
  background: #eaf4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 650px;
  background: #ffffff;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  text-align: center;
  border: 1px solid #eaf4f4;
}

h2 {
  color: #2c3e50;
  background: #ffffff;
  padding: 18px;
  border-radius: 16px;
  border: 2px solid #eaf4f4;
  margin-bottom: 15px;
}

.option {
  display: block;
  background: #ffffff;
  padding: 14px;
  margin: 10px 0;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.2s;
  border: 2px solid #f0f7f7;
}

.option:hover {
  background: #f5fbfb;
  transform: scale(1.01);
}

.selected {
  background: #eaf4f4;
  border: 2px solid #b2dfdb;
}

.correct {
  background: #d4edda !important;
  border: 2px solid #28a745 !important;
}

.wrong {
  background: #f8d7da !important;
  border: 2px solid #dc3545 !important;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-size: 15px;
  font-weight: bold;
}

#nextBtn {
  background: #c8e6c9;
  color: #2e4a3d;
}

#resultScreen {
  display: none;
}

.correctBox {
  background: #dff5e1;
  border: 2px solid #a9dfbf;
  padding: 25px;
  border-radius: 18px;
  animation: pop 0.3s ease, bounce 0.5s ease;
}

.wrongBox {
  background: #fdecea;
  border: 2px solid #f5b7b1;
  padding: 25px;
  border-radius: 18px;
  animation: pop 0.3s ease, shake 0.4s ease;
}

.rewardBox {
  background: #fff8dc;
  border: 2px solid #f9e79f;
  padding: 25px;
  border-radius: 18px;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes bounce {
  0% { transform: scale(0.95); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-4px); }
  100% { transform: translateX(0); }
}
</style>
</head>

<body>

<div style="position:absolute; top:20px; left:20px;">
  <button onclick="goBack()" style="
    width: 45px; height: 45px; border-radius: 12px; border: none;
    background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    cursor: pointer; font-size: 18px;
  ">←</button>
</div>

<div class="container">

  <div id="quizScreen">
    <img id="questionImage" style="display:none; max-width:100%; width:auto; height:auto; max-height:220px; border-radius:12px; margin:0 auto 10px auto; object-fit:contain;" alt="Scenario image">
    <h2 id="question">Loading...</h2>
    <div style="display:flex; gap:8px; justify-content:center; margin-bottom:8px;">
      <button onclick="repeatQuestion()" style="background:none; border:1px solid #ddd; border-radius:10px; padding:6px 14px; font-size:14px; cursor:pointer;">🔊 Repeat</button>
      <button onclick="readOptions()" style="background:none; border:1px solid #ddd; border-radius:10px; padding:6px 14px; font-size:14px; cursor:pointer;">🔊 Read Options</button>
    </div>
    <div id="options"></div>
    <div id="feedback" style="margin-top:12px; text-align:center; font-weight:bold; font-size:16px;"></div>
    <button id="nextBtn" onclick="nextQuestion()" style="display:none; width:100%; padding:14px; border:none; border-radius:14px; background:#a9dfbf; cursor:pointer; font-size:16px;">NEXT ➜</button>
  </div>

  <div id="resultScreen">
    <div id="resultBox"></div>
  </div>

</div>

<script src="questions.js"></script>
<script>
const API = 'http://localhost:5000/api';
const token = localStorage.getItem('token');

const params = new URLSearchParams(window.location.search);
const module = params.get('module');
const level = params.get('level');

let questions = [];
let index = 0;
let selected = null;
let answered = false;
let score = 0;

// ---- Load questions from backend (without answers) ----
async function loadQuestions() {
  if (!token || !module || !level) {
    document.getElementById('question').innerText = 'Missing module or level';
    return;
  }
  try {
    const res = await fetch(`${API}/games/module/${module}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) {
      document.getElementById('question').innerText = 'Failed to load questions';
      return;
    }
  } catch (_) {}

  // Questions are hardcoded on frontend for speed; answers validated by backend
  if (typeof questionBank !== 'undefined' && questionBank[module]?.[level]) {
    questions = questionBank[module][level];
  } else {
    document.getElementById('question').innerText = 'Questions not available';
    return;
  }
  loadQuestion();
}

function repeatQuestion() {
  const q = questions[index];
  if (q && window.speechSynthesis) {
    const utterance = new SpeechSynthesisUtterance(q.q);
    utterance.rate = 0.9;
    utterance.pitch = 1.1;
    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  }
}

function readOptions() {
  const q = questions[index];
  if (!q || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  q.options.forEach((opt, i) => {
    const utterance = new SpeechSynthesisUtterance(`Option ${i + 1}: ${opt}`);
    utterance.rate = 0.9;
    utterance.pitch = 1.1;
    setTimeout(() => speechSynthesis.speak(utterance), i * 2500);
  });
}

function loadQuestion() {
  selected = null;
  answered = false;
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('feedback').innerText = '';

  const q = questions[index];
  const imgEl = document.getElementById('questionImage');
  if (q.image) {
    imgEl.style.display = 'block';
    imgEl.src = q.image;
  } else {
    imgEl.style.display = 'none';
    imgEl.src = '';
  }
  document.getElementById('question').innerText = `Q${index + 1}. ${q.q}`;

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';

  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.classList.add('option');
    div.innerText = opt;
    div.onclick = () => handleOptionClick(div, i);
    optionsDiv.appendChild(div);
  });

  repeatQuestion();
}

// ---- On click: validate immediately, disable, show correct answer + Next ----
async function handleOptionClick(div, selectedIndex) {
  if (answered) return;
  answered = true;
  selected = selectedIndex;

  const allOptions = document.querySelectorAll('.option');
  allOptions.forEach(o => { o.style.pointerEvents = 'none'; o.classList.remove('selected'); });
  div.classList.add('selected');

  try {
    const res = await fetch(`${API}/games/check-answer`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      },
      body: JSON.stringify({ module, level, questionIndex: index, userAnswer: selected }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    const correctIndex = questions[index].correct;
    const feedbackEl = document.getElementById('feedback');

    if (data.correct) {
      score++;
      div.classList.add('correct');
      feedbackEl.innerHTML = '✅ <span style="color:#28a745;">Correct! Great job!</span>';
    } else {
      div.classList.add('wrong');
      allOptions[correctIndex].classList.add('correct');
      feedbackEl.innerHTML = `❌ <span style="color:#dc3545;">Incorrect.</span> Correct answer: <strong>${questions[index].options[correctIndex]}</strong>`;
    }

    document.getElementById('nextBtn').style.display = 'block';
  } catch (err) {
    console.error('Check answer error:', err);
    alert('Error checking answer');
    answered = false;
  }
}

// ---- Save results to backend ----
async function saveQuizToBackend() {
  const childId = await getChildProfileId();
  if (!childId || !token) {
    console.error('Cannot save: missing childId or token');
    return null;
  }
  try {
    const res = await fetch(`${API}/games`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      },
      body: JSON.stringify({
        child: childId, module, level, score, total: questions.length, completed: true,
      }),
    });
    return await res.json();
  } catch (err) {
    console.error('Save failed:', err);
    return null;
  }
}

// ---- Algorithm 3: Show rewards on quiz end ----
async function saveAndShowRewards() {
  const data = await saveQuizToBackend();
  if (!data?.success) {
    console.warn('Quiz result may not have saved');
  }

  const reward = data?.reward || { stars: 0, badge: 'None' };
  const badgeEmoji = { Gold: '🥇', Silver: '🥈', Bronze: '🥉', None: '' };
  const badgeText = reward.badge !== 'None' ? `<p>🏅 Badge: ${badgeEmoji[reward.badge]} ${reward.badge}</p>` : '';

  document.getElementById('resultBox').innerHTML = `
    <div class="rewardBox">
      <h2>🎉 Quiz Finished!</h2>
      <p>Your Score: ${score} / ${questions.length}</p>
      <p>⭐ Stars Earned: ${reward.stars > 0 ? '⭐'.repeat(reward.stars) : 'None'}</p>
      ${badgeText}
      <p>Great job! 🌟</p>
    </div>
  `;
}

function nextQuestion() {
  index++;
  if (index < questions.length) {
    loadQuestion();
  } else {
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    saveAndShowRewards();
  }
}

async function getChildProfileId() {
  let id = localStorage.getItem('childProfileId');
  if (id) return id;
  if (!token) return null;
  try {
    const res = await fetch(`${API}/games/dashboard/me`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('childProfileId', data.dashboard.id);
      return data.dashboard.id;
    }
  } catch (_) {}
  return null;
}

function goBack() {
  window.location.href = `level.html?module=${module}`;
}

loadQuestions();
</script>

</body>
</html>
