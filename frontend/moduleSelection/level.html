<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Choose Level</title>

<style>
body {
  font-family: 'Comic Sans MS', sans-serif;
  background: #FFF9C4;
  background-attachment: fixed;
  overflow-x: hidden;
  display:flex;
  justify-content: center;
  text-align: center;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.float-el{
  position:fixed;
  pointer-events:none;
  opacity:.25;
  z-index:0;
  animation:floatAnim 8s ease-in-out infinite;
}

.float-el:nth-child(1){ top:10%; left:5%; font-size:3rem; }
.float-el:nth-child(2){ top:70%; left:8%; font-size:2.5rem; animation-delay:2s; }
.float-el:nth-child(3){ top:20%; right:5%; font-size:2rem; animation-delay:4s; }
.float-el:nth-child(4){ top:80%; right:10%; font-size:3.5rem; animation-delay:1s; }
.float-el:nth-child(5){ top:50%; left:3%; font-size:1.8rem; animation-delay:3s; }
.float-el:nth-child(6){ top:40%; right:3%; font-size:2.2rem; animation-delay:5s; }
.float-el:nth-child(7){ top:5%; right:25%; font-size:2.8rem; animation-delay:1.5s; }
.float-el:nth-child(8){ top:88%; left:30%; font-size:2.4rem; animation-delay:3.5s; }

@keyframes floatAnim{
  0%,100%{ transform:translateY(0) rotate(0deg); }
  25%{ transform:translateY(-20px) rotate(5deg); }
  50%{ transform:translateY(-10px) rotate(-3deg); }
  75%{ transform:translateY(-25px) rotate(4deg); }
}

.bg-dots{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.08;
  background-image:radial-gradient(circle,#FF8A65 1px,transparent 1px);
  background-size:30px 30px;
}

.container {
  width: 100%;
  max-width: 600px;
  text-align: center;
}

.level {
  display: flex;
  align-items: center;
  justify-content: center;
  background: white;
  padding: 18px;
  border-radius: 18px;
  margin-bottom: 18px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.3s;
  position: relative;
}

.level:hover:not(.locked) {
  transform: scale(1.05);
}

.level.locked {
  opacity: 0.5;
  cursor: not-allowed;
}

.icon {
  font-size: 40px;
  margin-right: 15px;
}

.easy { background:#a9dfbf; }
.medium { background:#f9e79f; }
.hard { background:#f5cba7; }

.lock-icon {
  position: absolute;
  right: 20px;
  font-size: 24px;
}

h2 {
  margin-bottom: 25px;
}

</style>
</head>

  <body>

<div class="float-el">🌟</div>
<div class="float-el">⭐</div>
<div class="float-el">🌻</div>
<div class="float-el">🌈</div>
<div class="float-el">✨</div>
<div class="float-el">🌼</div>
<div class="float-el">☀️</div>
<div class="float-el">💛</div>
<div class="bg-dots"></div>

 <div class="container">
  <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 25px; position: relative;">

  <button onclick="goBack()" style="
      position: absolute;
      left: 0;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      font-size: 18px;
  ">
    ←
  </button>

  <h2 style="margin: 0;">Choose Level 🎯</h2>

</div>

<div id="easyLevel" class="level" onclick="go('easy')">
  <div class="icon easy">😊</div>
  <h3>Easy</h3>
</div>

<div id="mediumLevel" class="level locked" onclick="go('medium')">
  <div class="icon medium">🙂</div>
  <h3>Medium</h3>
  <span class="lock-icon">🔒</span>
</div>

<div id="hardLevel" class="level locked" onclick="go('hard')">
  <div class="icon hard">😎</div>
  <h3>Hard</h3>
  <span class="lock-icon">🔒</span>
</div>

</div>

<script>
  const API = 'http://localhost:5000/api';
  const params = new URLSearchParams(window.location.search);
  const module = params.get("module");

  function go(level) {
    if (!module) {
      alert("Module not selected!");
      return;
    }
    const el = document.getElementById(level + 'Level');
    if (el.classList.contains('locked')) {
      alert('Complete the previous level first!');
      return;
    }
    window.location.href = `quiz.html?module=${module}&level=${level}`;
  }

  function goBack() {
    window.location.href = "module_selection.html";
  }

  async function loadLevels() {
    const token = localStorage.getItem('token');
    if (!token || !module) return;

    try {
      const res = await fetch(`${API}/games/module/${module}?_=${Date.now()}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      if (!data.success) return;

      const completed = data.completed || {};

      if (completed.easy) {
        document.getElementById('mediumLevel').classList.remove('locked');
        document.getElementById('mediumLevel').querySelector('.lock-icon')?.remove();
      }
      if (completed.medium) {
        document.getElementById('hardLevel').classList.remove('locked');
        document.getElementById('hardLevel').querySelector('.lock-icon')?.remove();
      }
    } catch (err) {
      console.error('Failed to load level progress:', err);
    }
  }

  loadLevels();
</script>

</body>
</html>
